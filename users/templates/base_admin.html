<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NETSUP Admin | Direction</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet"/>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandBlue: '#0056b3',
                        brandRed: '#d9534f',
                    }
                }
            }
        }
    </script>
    <style>
        .sidebar-link-active {
            background-color: #f1f5f9;
            color: #0056b3;
            border-left: 4px solid #0056b3;
            font-weight: 700;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div class="drawer lg:drawer-open">
        <input id="my-drawer" type="checkbox" class="drawer-toggle" />
        
        <div class="drawer-content flex flex-col">
            <header class="lg:hidden navbar bg-white border-b border-slate-200 px-4 sticky top-0 z-40">
                <div class="flex-1 font-black italic">
                    <span class="text-brandBlue">NET</span><span class="text-brandRed">SUP</span> 
                    <span class="text-xs text-slate-400 ml-1 uppercase">Direction</span>
                </div>
                <div class="flex-none">
                    <label for="my-drawer" class="btn btn-square btn-ghost drawer-button">
                        <i data-lucide="menu"></i>
                    </label>
                </div>
            </header>

            <main class="p-4 md:p-8 max-w-[1400px] mx-auto w-full">
                {% block content %}{% endblock %}
            </main>
        </div> 

        <div class="drawer-side z-50">
            <label for="my-drawer" aria-label="close sidebar" class="drawer-overlay"></label>
            
            <aside class="w-64 min-h-full bg-white border-r border-slate-200 flex flex-col">
                <div class="p-8 border-b border-slate-50">
                    <h1 class="text-2xl font-black italic tracking-tighter">
                        <span class="text-brandBlue">NET</span><span class="text-brandRed">SUP</span>
                    </h1>
                </div>

<nav class="flex-1 p-4 space-y-1">
    <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4 mt-2 px-2">Analytique</div>
    
    <a href="{% url 'dashboard_admin' %}" class="flex items-center gap-3 p-3 rounded-xl hover:bg-slate-50 transition-all {% if request.resolver_match.url_name == 'dashboard_admin' %}sidebar-link-active{% endif %}">
        <i data-lucide="line-chart" class="w-5 h-5"></i>
        <span class="text-sm">Vue d'ensemble</span>
    </a>
    
    <a href="{% url 'couverture_hebdo' %}" class="flex items-center gap-3 p-3 rounded-xl hover:bg-slate-50 transition-all {% if request.resolver_match.url_name == 'couverture_hebdo' %}sidebar-link-active{% endif %}">
        <i data-lucide="check-square" class="w-5 h-5"></i>
        <span class="text-sm">Couverture Hebdo</span>
    </a>
    <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-8 mb-4 px-2">Rapports</div>

<a href="{% url 'admin_rapport_list' %}" class="flex items-center gap-3 p-3 rounded-lg hover:bg-slate-50 transition-all {% if request.resolver_match.url_name == 'admin_rapport_list' %}sidebar-link-active{% endif %}">
    <i data-lucide="clipboard-list" class="w-5 h-5"></i>
    <span class="text-sm">Tous les rapports</span>
</a>

    <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-6 mb-2 px-2">Opérations</div>

    <a href="{% url 'admin_site_list' %}" class="flex items-center gap-3 p-3 rounded-xl hover:bg-slate-50 transition-all {% if request.resolver_match.url_name == 'admin_site_list' or request.resolver_match.url_name == 'admin_site_detail' or request.resolver_match.url_name == 'admin_site_create' %}sidebar-link-active{% endif %}">
        <i data-lucide="building-2" class="w-5 h-5"></i>
        <span class="text-sm">Gestion des Sites</span>
    </a>

    <a href="{% url 'liste_incidents_critiques' %}" class="flex items-center gap-3 p-3 rounded-xl hover:bg-slate-50 transition-all {% if request.resolver_match.url_name == 'liste_incidents_critiques' %}sidebar-link-active{% endif %}">
        <i data-lucide="alert-triangle" class="w-5 h-5"></i>
        <span class="text-sm">Incidents Critiques</span>
    </a>

    <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-6 mb-2 px-2">Système</div>

    <a href="{% url 'user_list' %}" class="flex items-center gap-3 p-3 rounded-xl hover:bg-slate-50 transition-all {% if 'user' in request.resolver_match.url_name or 'technicien' in request.resolver_match.url_name %}sidebar-link-active{% endif %}">
        <i data-lucide="users" class="w-5 h-5"></i>
        <span class="text-sm">Gestion Personnel</span>
    </a>
</nav>
                <div class="p-4 border-t border-slate-100 bg-slate-50/50">
                    <div class="flex items-center gap-3 px-2 mb-4">
                        <div class="bg-brandBlue text-white rounded-lg w-8 h-8 flex items-center justify-center font-bold text-xs uppercase">
                            {{ user.username|slice:":2" }}
                        </div>
                        <div class="text-xs truncate">
                            <p class="font-bold text-slate-700 truncate">{{ user.username }}</p>
                            <p class="text-brandRed font-medium">Administrateur</p>
                        </div>
                    </div>
                    <a href="{% url 'logout' %}" class="btn btn-outline btn-error btn-xs btn-block gap-2 border-slate-200">
                        <i data-lucide="log-out" class="w-3"></i> Déconnexion
                    </a>
                </div>
            </aside>
        </div>
    </div>

    <script>
        // Initialisation des icônes
        lucide.createIcons();
    </script>
</body>
</html>
