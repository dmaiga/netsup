<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NETSUP | Excellence Opérationnelle</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet"/>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandBlue: '#0056b3',
                        brandRed: '#d9534f',
                    },
                    borderRadius: {
                        '3xl': '1.5rem',
                        '4xl': '2rem',
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen flex flex-col">

    <nav class="navbar glass-nav sticky top-0 z-50 border-b border-slate-200 px-6 py-4">
        <div class="flex-1">
            <a href="/" class="flex items-center gap-2 group">
                <span class="text-2xl font-black italic tracking-tighter transition-transform group-hover:scale-105">
                    <span class="text-brandBlue">NET</span><span class="text-brandRed">SUP</span>
                </span>
            </a>
        </div>

        <div class="flex-none gap-4">
            {% if user.is_authenticated %}
                <div class="dropdown dropdown-end">
                    <label tabindex="0" class="btn btn-ghost hover:bg-slate-100 rounded-2xl gap-3 px-4">
                        <div class="flex flex-col items-end hidden md:flex">
                            <span class="text-xs font-black text-slate-800 uppercase">{{ user.username }}</span>
                            <span class="text-[9px] font-bold text-brandBlue uppercase tracking-widest">{{ user.role }}</span>
                        </div>
                        <div class="w-10 h-10 rounded-xl bg-brandBlue/10 flex items-center justify-center text-brandBlue">
                            <i data-lucide="user-circle" class="w-6 h-6"></i>
                        </div>
                    </label>
                    <ul tabindex="0" class="dropdown-content menu p-2 mt-4 shadow-2xl bg-white rounded-3xl w-64 border border-slate-100">
                        <li class="menu-title px-4 py-2 text-[10px] font-black text-slate-400 uppercase tracking-widest">Navigation</li>
                        <li><a href="{% url 'dashboard_admin' %}" class="rounded-2xl py-3"><i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard</a></li>
                        <li><a href="{% url 'user_list' %}" class="rounded-2xl py-3"><i data-lucide="users" class="w-4 h-4"></i> Équipe</a></li>
                        <div class="divider my-1 opacity-50"></div>
                        <li><a href="{% url 'logout' %}" class="rounded-2xl py-3 text-brandRed hover:bg-red-50"><i data-lucide="log-out" class="w-4 h-4"></i> Déconnexion</a></li>
                    </ul>
                </div>
            {% else %}
                <a href="{% url 'login' %}" class="btn btn-ghost btn-sm font-black text-xs uppercase tracking-widest">Connexion</a>
            {% endif %}
        </div>
    </nav>

    {% if messages %}
    <div class="fixed top-24 right-6 z-[60] flex flex-col gap-3">
        {% for message in messages %}
        <div class="alert {% if message.tags == 'error' %}alert-error{% else %}alert-success{% endif %} shadow-xl rounded-2xl border-none text-white font-bold min-w-[300px]">
            <i data-lucide="{% if message.tags == 'error' %}info{% else %}check-circle{% endif %}" class="w-5 h-5"></i>
            <span>{{ message }}</span>
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <main class="flex-1">
        {% block content %}{% endblock %}
    </main>



    <script>
        lucide.createIcons();
    </script>
</body>
</html>
