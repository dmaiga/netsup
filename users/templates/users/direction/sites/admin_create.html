{% extends "base_admin.html" %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="mb-8">
        <a href="{% url 'admin_site_list' %}" class="text-brandBlue text-xs font-black uppercase flex items-center gap-1 mb-2">
            <i data-lucide="arrow-left" class="w-3 h-3"></i> Annuler
        </a>
        <h1 class="text-3xl font-black text-slate-800 tracking-tight">Ajouter un nouveau site</h1>
    </div>

    <form method="POST" class="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm space-y-6">
        {% csrf_token %}
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="form-control">
                <label class="label font-bold text-slate-500 text-[10px] uppercase">Nom du Site</label>
                <input type="text" name="nom" placeholder="ex: GARE DU NORD" class="input input-bordered rounded-xl border-slate-200" required>
            </div>
            <div class="form-control">
                <label class="label font-bold text-slate-500 text-[10px] uppercase">Code Site (Unique)</label>
                <input type="text" name="code_site" placeholder="ex: GN-001" class="input input-bordered rounded-xl border-slate-200" required>
            </div>
        </div>

        <div class="form-control">
            <label class="label font-bold text-slate-500 text-[10px] uppercase">Nom du Client</label>
            <input type="text" name="client_nom" placeholder="ex: SNCF" class="input input-bordered rounded-xl border-slate-200" required>
        </div>

        <div class="form-control">
            <label class="label font-bold text-slate-500 text-[10px] uppercase">Adresse Complète</label>
            <input type="text" name="adresse" class="input input-bordered rounded-xl border-slate-200" required>
        </div>

        <div class="form-control w-full md:w-1/2">
            <label class="label font-bold text-slate-500 text-[10px] uppercase">Techniciens prévus (Contrat)</label>
            <input type="number" name="nb_prevus" min="1" class="input input-bordered rounded-xl border-slate-200 font-black text-brandBlue" required>
        </div>

        <div class="pt-6 border-t border-slate-50">
            <button type="submit" class="btn btn-primary btn-block bg-brandBlue border-none text-white font-black uppercase">
                Créer le site et générer le QR Code
            </button>
        </div>
    </form>
</div>
{% endblock %}
