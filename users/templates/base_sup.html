<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>NETSUP | Portail Superviseur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet"/>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandBlue: '#0056b3', // Bleu NETSUP (à ajuster selon votre logo)
                        brandRed: '#d9534f',  // Rouge NETSUP (à ajuster selon votre logo)
                    }
                }
            }
        }
    </script>
    <style>
        /* Lien actif Desktop */
        .nav-active {
            color: theme('colors.brandBlue') !important;
            background-color: #f1f5f9 !important; /* slate-100 */
            border-left: 4px solid theme('colors.brandBlue');
            font-weight: 700;
        }
        /* Lien actif Mobile */
        .btm-active {
            color: theme('colors.brandBlue') !important;
            border-top: 3px solid theme('colors.brandBlue') !important;
        }
    </style>
</head>
<body class="bg-[#fcfcfc] text-slate-800 min-h-screen pb-20 lg:pb-0 lg:pl-64">

    <aside class="hidden lg:flex flex-col w-64 bg-white border-r border-slate-200 fixed inset-y-0 left-0 z-50">
        <div class="p-8">
            <h1 class="text-2xl font-black italic tracking-tighter">
                <span class="text-brandBlue">NET</span><span class="text-brandRed">SUP</span>
            </h1>
        </div>
        
        <nav class="flex-1 px-4 space-y-1">
            <a href="{% url 'dashboard_superviseur' %}" 
               class="flex items-center gap-4 p-3 rounded-r-xl transition-all hover:bg-slate-50 {% if request.resolver_match.url_name == 'dashboard_superviseur' %}nav-active{% endif %}">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                <span class="text-sm">Tableau de bord</span>
            </a>
            
            <a href="{% url 'superviseur_sites' %}" 
               class="flex items-center gap-4 p-3 rounded-r-xl transition-all hover:bg-slate-50 {% if request.resolver_match.url_name == 'superviseur_sites' %}nav-active{% endif %}">
                <i data-lucide="map-pin" class="w-5 h-5"></i>
                <span class="text-sm">Gestion des Sites</span>
            </a>
            
            <a href="{% url 'controle_list' %}" 
               class="flex items-center gap-4 p-3 rounded-r-xl transition-all hover:bg-slate-50 {% if request.resolver_match.url_name == 'controle_list' %}nav-active{% endif %}">
                <i data-lucide="clipboard-check" class="w-5 h-5"></i>
                <span class="text-sm">Historique</span>
            </a>
        </nav>

        <div class="p-6 border-t border-slate-100">
            <button class="flex items-center gap-2 text-xs font-bold text-slate-400 hover:text-brandRed transition-colors">
                <i data-lucide="power" class="w-4 h-4"></i>
                DÉCONNEXION
            </button>
        </div>
    </aside>

    <header class="lg:hidden navbar bg-white border-b border-slate-100 sticky top-0 z-40 px-6 h-16">
        <div class="flex-1">
            <span class="text-xl font-black italic tracking-tighter text-slate-800">
                <span class="text-brandBlue">NET</span><span class="text-brandRed">SUP</span>
            </span>
        </div>
        <div class="flex-none">
            <div class="w-9 h-9 rounded-lg bg-slate-100 flex items-center justify-center font-bold text-brandBlue border border-slate-200 shadow-sm">
                JD
            </div>
        </div>
    </header>

    <main class="p-6 max-w-5xl mx-auto">
        {% block content %}{% endblock %}
    </main>

    <nav class="lg:hidden btm-nav btm-nav-md border-t border-slate-200 bg-white z-50">
        <a href="{% url 'dashboard_superviseur' %}" 
           class="{% if request.resolver_match.url_name == 'dashboard_superviseur' %}btm-active{% else %}text-slate-400{% endif %}">
            <i data-lucide="home" class="w-5 h-5"></i>
        </a>
        
        <a href="{% url 'superviseur_sites' %}" 
           class="{% if request.resolver_match.url_name == 'superviseur_sites' %}btm-active{% else %}text-slate-400{% endif %}">
            <i data-lucide="map" class="w-5 h-5"></i>
        </a>

        <a href="{% url 'scan' %}" class="relative overflow-visible">
            <div class="absolute -top-6 bg-brandBlue text-white p-4 rounded-full shadow-xl ring-4 ring-white active:scale-90 transition-transform">
                <i data-lucide="qr-code" class="w-7 h-7"></i>
            </div>
        </a>

        <a href="{% url 'controle_list' %}" 
           class="{% if request.resolver_match.url_name == 'controle_list' %}btm-active{% else %}text-slate-400{% endif %}">
            <i data-lucide="file-text" class="w-5 h-5"></i>
        </a>
        
        <a href="#" class="text-slate-400">
            <i data-lucide="user" class="w-5 h-5"></i>
        </a>
    </nav>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
